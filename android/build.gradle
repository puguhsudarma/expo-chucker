apply plugin: 'com.android.library'

group = 'com.chucker'
import groovy.json.JsonSlurper

def getPackageJson() {
    def inputFile = new File(rootProject.projectDir, '../package.json')
    return new JsonSlurper().parseText(inputFile.text)
}

def packageJson = getPackageJson()
version = packageJson.version

def getVersionCodeFromVersion(String version) {
    def (major, minor, patch) = version.tokenize('.')
    return (major.toInteger() * 10000) + (minor.toInteger() * 100) + patch.toInteger()
}

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir.absolutePath, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin
applyKotlinExpoModulesCorePlugin()
useCoreDependencies()
useExpoPublishing()

// If you want to use the managed Android SDK versions from expo-modules-core, set this to true.
// The Android SDK versions will be bumped from time to time in SDK releases and may introduce breaking changes in your module code.
// Most of the time, you may like to manage the Android SDK versions yourself.
def useManagedAndroidSdkVersions = false
if (useManagedAndroidSdkVersions) {
  useDefaultAndroidSdkVersions()
} else {
  buildscript {
    // Simple helper that allows the root project to override versions declared by this library.
    ext.safeExtGet = { prop, fallback ->
      rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }
  }
  project.android {
    compileSdkVersion safeExtGet("compileSdkVersion", 34)
    defaultConfig {
      minSdkVersion safeExtGet("minSdkVersion", 21)
      targetSdkVersion safeExtGet("targetSdkVersion", 34)
    }
  }
}

android {
  namespace group
  defaultConfig {
    versionCode getVersionCodeFromVersion(version)
    versionName version
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "com.facebook.react:react-android:0.76.9"

  // get CHUCKER_ENABLED flag from gradle.properties
  def isEnabledChucker = project.hasProperty('CHUCKER_ENABLED') ? CHUCKER_ENABLED.toBoolean() : true

  if (isEnabledChucker) {
    implementation "com.github.chuckerteam.chucker:library:4.1.0"
  } else {
    implementation "com.github.chuckerteam.chucker:library-no-op:4.1.0"
  }
}
